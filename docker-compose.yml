services:
  postgres:
    image: postgres:15
    container_name: ${POSTGRES_HOST}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}        
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_PORT}"
    volumes:
      - ./data:/var/lib/postgresql/data  
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1 -c 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  flyway:
    image: flyway/flyway:latest
    environment:
      FLYWAY_URL: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}    
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      MIGRATION_VERSION: ${MIGRATION_VERSION:-}
    entrypoint: >
      sh -c '
        if [ $# -gt 0 ]; then
          exec flyway "$@"
        elif [ -n "$MIGRATION_VERSION" ]; then
          flyway migrate -X -target="$MIGRATION_VERSION";
        else 
          flyway migrate -X;
        fi
      ' --
    volumes:
      - ./migrations:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build: ./seed
    volumes: 
      - ./seed:/app
    environment:
      APP_ENV: ${APP_ENV}
      SEED_COUNT: ${SEED_COUNT}
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER} 
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      
  create-analytic-roles:
    image: postgres:15
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_USER}
      PGDATABASE: ${POSTGRES_DB}
      PGHOST: ${POSTGRES_HOST}
      ANALYST_NAMES: ${ANALYST_NAMES}
    volumes:
      - ./roles:/roles:ro
    entrypoint: >
      sh -c '
        psql -v ANALYST_NAMES=${ANALYST_NAMES} -v ON_ERROR_STOP=1 -f /roles/create_analytic_roles.sql
      '
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: /queries/extra.yml
    ports:
      - "9187:9187"
    restart: unless-stopped
    volumes:
      - ./monitoring/extra.yml:/queries/extra.yml:ro
    depends_on:
      postgres:
        condition: service_healthy

  node_exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node_exporter
    restart: unless-stopped
    command: []

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    depends_on:
      - postgres_exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - ./grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  backend:
    build: ./backend
    environment:
      APP_ENV: ${APP_ENV}
      SEED_COUNT: ${SEED_COUNT}
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER} 
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: 
      - ./backend:/app:ro
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

  backups:
    build: ./backup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_USER}
      PGDATABASE: ${POSTGRES_DB}
      PGHOST: ${POSTGRES_HOST}
      TZ: ${TIME_ZONE}
      BACKUP_INTERVAL_CRON: ${BACKUP_INTERVAL_CRON}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT}
    volumes:
      - ./backup/backups:/backups 
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy


volumes:
  prometheus-data:
#   pgdata:
#   grafana-data: