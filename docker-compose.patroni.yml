volumes:
  pgdata1:
  pgdata2:
  pgdata3:

services:
  patroni1:
    image: ongres/patroni:latest
    container_name: patroni1
    ports: ["${PATRONI1_HOST_PORT}:5432", "8008:8008"]
    environment:
      PATRONI_NAME: "patroni1"
      SCOPE: "${CLUSTER_SCOPE}"
      TZ: "${TIME_ZONE}"
    command: ["patroni", "/etc/patroni/patroni.yml"]
    volumes:
      - ./patroni_configs/patroni1.yml:/etc/patroni/patroni.yml:ro
      - pgdata1:/var/lib/postgresql
    depends_on:
      etcd:
        condition: service_healthy
    networks: [patroninet]

  patroni2:
    image: ongres/patroni:latest
    container_name: patroni2
    ports: ["${PATRONI2_HOST_PORT}:5432", "8009:8008"]
    environment:
      PATRONI_NAME: "patroni2"
      SCOPE: "${CLUSTER_SCOPE}"
      TZ: "${TIME_ZONE}"
    command: ["patroni", "/etc/patroni/patroni.yml"]
    volumes:
      - ./patroni_configs/patroni2.yml:/etc/patroni/patroni.yml:ro
      - pgdata2:/var/lib/postgresql
    depends_on:
      etcd:
        condition: service_healthy
    networks: [patroninet]

  patroni3:
    image: ongres/patroni:latest
    container_name: patroni3
    ports: ["${PATRONI3_HOST_PORT}:5432", "8010:8008"]
    environment:
      PATRONI_NAME: "patroni3"
      SCOPE: "${CLUSTER_SCOPE}"
      TZ: "${TIME_ZONE}"
    command: ["patroni", "/etc/patroni/patroni.yml"]
    volumes:
      - ./patroni_configs/patroni3.yml:/etc/patroni/patroni.yml:ro
      - pgdata3:/var/lib/postgresql
    depends_on:
      etcd:
        condition: service_healthy
    networks: [patroninet]

  etcd:
    image: bitnami/etcd:3.5
    container_name: etcd
    ports: ["2379:2379"]
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ENABLE_V2=false
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379      
    networks: [patroninet]
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
  
  haproxy:
    image: haproxy:2.8
    container_name: haproxy
    ports: ["${HAPROXY_PRIMARY_HOST_PORT}:5432", "${HAPROXY_REPLICA_HOST_PORT}:5433"]
    volumes:
      - ./patroni_configs/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on: [patroni1, patroni2, patroni3]
    networks: [patroninet]

networks:
  patroninet:
    external: true